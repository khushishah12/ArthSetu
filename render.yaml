services:
  - type: web
    name: arthsetu-ml-api
    runtime: python
    rootDir: ml-service
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/v1/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.10
      - key: ML_SERVICE_API_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://your-arthsetu-domain.vercel.app
